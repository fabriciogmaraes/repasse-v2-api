# --- BASE A (PRINCIPAL) ---
spring.datasource.url=jdbc:h2:mem:base_principal;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- BASE B (AUDITORIA) ---
db2.datasource.url=jdbc:h2:mem:base_auditoria;DB_CLOSE_DELAY=-1
db2.datasource.driverClassName=org.h2.Driver
db2.datasource.username=sa
db2.datasource.password=

# Configs Gerais
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true